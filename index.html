<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Counter App</title>

 
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

 
  <div class="flex flex-col items-center justify-center h-screen bg-gray-100">

    <div id="display" class="text-6xl font-bold mb-8">0</div>

    <div class="flex gap-4">
      <button id="decrement" class="bg-red-500 text-white text-2xl px-6 py-3 rounded-xl hover:bg-red-600">−</button>
      <button id="increment" class="bg-green-500 text-white text-2xl px-6 py-3 rounded-xl hover:bg-green-600">+</button>
    </div>

  </div>

  
  <script>
    let count = 0;
    const display = document.getElementById('display');

    function updateDisplay() {
      if (count === 0) {
        display.classList.add('invisible');
      } else {
        display.classList.remove('invisible');
        display.textContent = count;
      }
    }

    document.getElementById('increment').addEventListener('click', () => {
      count++;
      updateDisplay();
    });

    document.getElementById('decrement').addEventListener('click', () => {
      count--;
      updateDisplay();
    });

    updateDisplay(); // hide 0 on page load
  </script>

</body>
</html>
